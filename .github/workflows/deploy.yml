name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 8.153.198.194
          username: root
          port: 63022
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/ai_work_order
            git fetch origin main
            git reset --hard origin/main